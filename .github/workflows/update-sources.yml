name: Collect Latest AI Releases

on:
  schedule:
    - cron: '0 9 * * 1' # Runs weekly on Monday at 09:00 UTC (17:00 Taipei)
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write
  pull-requests: write

jobs:
  collect-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run collector script
        run: npx tsx scripts/collect-sources.ts

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request with New Data
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "data: update AI release sources automatically"
          branch: "auto-update-sources"
          title: "🤖 發現最新 AI 技術/釋出資訊"
          body: |
            GitHub Actions 已自動偵測並彙整 Google Blog 與 OpenAI Blog 上的最新 AI 發布文章。
            新發布的文章已併入 `data-sources-latest.json`。
            
            請審閱此 PR 的異動以獲取最新 AI 技術資訊，並視需要更新評分表。
          delete-branch: true
